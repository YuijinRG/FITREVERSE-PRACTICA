<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitReserve | Usuario</title>
    <style>
        body{font-family:Arial,sans-serif;background:#111827;color:#f8fafc;padding:24px;margin:0;}
        .card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px;}
        .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:0.8rem;background:#f59e0b;color:#111827;margin-left:8px;}
        table{width:100%;border-collapse:collapse;margin-top:12px;}
        th,td{padding:12px;border:1px solid #334155;text-align:left;}
        .btn{padding:8px 14px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;}
        .btn-danger{background:#dc2626;}
        .btn:disabled{opacity:0.6;cursor:not-allowed;}
        .msg{padding:10px;border-radius:8px;margin:12px 0;} .success{background:#134e4a;color:#d1fae5;} .error{background:#7f1d1d;color:#fee2e2;}
    </style>
</head>
<body>
<div class="card">
    <h1>Área de Usuario</h1>
    <p>Bienvenido <strong th:text="${user.email}"></strong></p>
    <p>Rol: <strong th:text="${user.role}"></strong> <span class="badge">Reserva sin membresía</span></p>
</div>

<div th:if="${success}" class="msg success"><p th:text="${success}"></p></div>
<div th:if="${error}" class="msg error"><p th:text="${error}"></p></div>

<section class="card">
    <h2>Clases disponibles</h2>
    <table>
        <thead>
        <tr style="background:#1e293b;">
            <th>Nombre</th>
            <th>Horario</th>
            <th>Cupos</th>
            <th>Estado</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="clase : ${classes}">
            <td th:text="${clase.name}"></td>
            <td th:text="${clase.schedule}"></td>
            <td th:text="${clase.capacity}"></td>
            <td>
                <span th:if="${clase.capacity > 0}" style="color:#86efac;">Disponible</span>
                <span th:if="${clase.capacity <= 0}" style="color:#fda4af;">Aforo lleno</span>
            </td>
            <td>
                <form th:action="@{/reservar}" method="post" style="display:inline;">
                    <input type="hidden" name="classId" th:value="${clase.id}"/>
                    <button type="submit" class="btn" th:disabled="${clase.capacity <= 0}">Reservar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${classes.empty}">
            <td colspan="5" style="text-align:center;">No hay clases disponibles</td>
        </tr>
        </tbody>
    </table>
</section>

<section class="card">
    <h2>Mis reservas</h2>
    <table>
        <thead>
        <tr style="background:#1e293b;">
            <th>Clase</th>
            <th>Horario</th>
            <th>Pago</th>
            <th>Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="registro : ${registrations}">
            <td th:text="${registro.gymClass.name}"></td>
            <td th:text="${registro.gymClass.schedule}"></td>
            <td>
                <span th:if="${registro.paid}" style="color:#86efac;">Pago registrado</span>
                <span th:unless="${registro.paid}" style="color:#fcd34d;">Pendiente</span>
            </td>
            <td>
                <form th:action="@{/cancelar}" method="post" style="display:inline;">
                    <input type="hidden" name="registrationId" th:value="${registro.id}"/>
                    <button type="submit" class="btn btn-danger">Cancelar</button>
                </form>
            </td>
        </tr>
        <tr th:if="${registrations.empty}">
            <td colspan="4" style="text-align:center;">No tienes reservas aún</td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
