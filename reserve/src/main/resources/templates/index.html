<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitReserve | Login</title>
    <style>
        :root { --bg:#0f172a; --panel:rgba(15,23,42,0.9); --accent:#f59e0b; --accent-2:#fb923c; --text:#f8fafc; --muted:#cbd5e1; }
        *{box-sizing:border-box;} body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(135deg,#020617,#111827 55%,#1f2937);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .login-card{width:100%;max-width:420px;background:var(--panel);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.35);border-radius:24px;padding:32px;backdrop-filter:blur(12px);} .brand{display:flex;align-items:center;gap:12px;margin-bottom:16px;} .brand-icon{width:46px;height:46px;display:grid;place-items:center;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));font-size:22px;} h1{margin:0;font-size:1.7rem;} .subtitle{margin:6px 0 24px;color:var(--muted);line-height:1.5;} form{display:flex;flex-direction:column;gap:14px;} label{font-size:.92rem;color:var(--muted);} input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--text);outline:none;} input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,158,11,.25);} button{margin-top:8px;padding:12px 16px;border:none;border-radius:999px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#111827;font-weight:700;cursor:pointer;} .footer{margin-top:16px;text-align:center;color:var(--muted);font-size:.9rem;} .footer a{color:var(--accent);text-decoration:none;} .msg{padding:10px;border-radius:10px;margin-bottom:14px;} .error{background:rgba(239,68,68,.2);color:#fecaca;} .success{background:rgba(34,197,94,.2);color:#bbf7d0;}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">💪</div>
            <div>
                <h1>FitReserve</h1>
                <div class="subtitle">Tu energía, tu rutina, tu mejor versión.</div>
            </div>
        </div>

        <div th:if="${error}" class="msg error" th:text="${error}"></div>
        <div th:if="${success}" class="msg success" th:text="${success}"></div>

        <form action="/login" method="post">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" placeholder="tucorreo@ejemplo.com" required>

            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="********" required>

            <button type="submit">Entrar</button>
        </form>

        <div class="footer">
            ¿No tienes cuenta? <a href="/registro">Crea una aquí</a>
        </div>
    </div>
</body>
</html>
