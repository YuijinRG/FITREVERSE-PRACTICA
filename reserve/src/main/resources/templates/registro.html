<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitReserve | Registro</title>
    <style>
        :root { --bg:#0f172a; --panel:rgba(15,23,42,0.92); --accent:#f59e0b; --text:#f8fafc; --muted:#cbd5e1; }
        *{box-sizing:border-box;} body{margin:0;font-family:Arial, sans-serif;background:linear-gradient(135deg,#020617,#111827 55%,#1f2937);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
        .card{width:100%;max-width:460px;background:var(--panel);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:32px;box-shadow:0 20px 50px rgba(0,0,0,.35);}
        h1{margin:0 0 8px;font-size:1.7rem;} .subtitle{color:var(--muted);margin-bottom:20px;} form{display:flex;flex-direction:column;gap:12px;} label{color:var(--muted);} input, select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:var(--text);} input:focus, select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(245,158,11,.25);} button{margin-top:8px;padding:12px 16px;border:none;border-radius:999px;background:linear-gradient(135deg,var(--accent),#fb923c);color:#111827;font-weight:700;cursor:pointer;} .msg{padding:10px;border-radius:10px;margin-bottom:14px;} .error{background:rgba(239,68,68,.2);color:#fecaca;} .success{background:rgba(34,197,94,.2);color:#bbf7d0;} a{color:var(--accent);text-decoration:none;display:inline-block;margin-top:12px;}
    </style>
</head>
<body>
<div class="card">
    <h1>Crear cuenta</h1>
    <div class="subtitle">Regístrate como administrador o como usuario del gimnasio.</div>

    <div th:if="${error}" class="msg error" th:text="${error}"></div>
    <div th:if="${success}" class="msg success" th:text="${success}"></div>

    <form action="/registro" method="post">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" required>

        <label for="role">Tipo de cuenta</label>
        <select id="role" name="role">
            <option value="USER">Usuario</option>
            <option value="ADMIN">Administrador</option>
        </select>

        <button type="submit">Registrarme</button>
    </form>

    <a href="/">Volver al login</a>
</div>
</body>
</html>
